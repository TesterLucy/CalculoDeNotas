<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué nota necesito?</title>
  <link rel="stylesheet" href="../estilos.css">
</head>
<body>
  <div class="container">
    <span class="header-icon">🎯</span>
    <h1>¿Qué nota necesito?</h1>
    <h2>Calcula la nota mínima para aprobar</h2>

    <div class="divider"></div>

    <label for="numCortes">Número de cortes del curso</label>
    <input type="number" id="numCortes" min="2" max="10" value="3">

    <button id="btnGenerar">⚙️ Generar cortes</button>

    <div id="cortesContainer"></div>

    <button id="btnCalcular" style="display:none;">🧮 Calcular nota mínima</button>

    <div id="resultado" class="resultado"></div>

    <button onclick="location.href='../index.html'" class="volver">← Volver al inicio</button>
  </div>

  <script src="../proceso/calcularnotaminima.js"></script>
</body>
</html>
